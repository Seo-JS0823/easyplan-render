server:
  forward-headers-strategy: native
  port: 8080

spring:
  application:
    name: easyplan
  config:
    import:
      - optional:file:.env[.properties]
  thymeleaf:
    cache: false
    prefix: classpath:templates/
    suffix: .html
    mode: HTML
  datasource:
    url: ${JDBC_URL}
    driver-class-name: org.postgresql.Driver
    username: ${JDBC_USERNAME}
    password: ${JDBC_PASSWORD}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        '[format_sql]': true
        '[show_Sql]': true
  data: 
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
            port: ${SMTP_PORT}
jwt:
  secret: ${JWT_SECRET}
  times:
    access: 1800000
    refresh: 604800000
  
logging:
  level:
    org:
      springframework:
        security: DEBUG
        cache: trace